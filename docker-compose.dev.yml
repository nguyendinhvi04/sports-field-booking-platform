# ================================================================
# docker-compose.dev.yml — DEVELOPMENT (có hot-reload)
# Chạy: docker compose -f docker-compose.dev.yml up
# ================================================================

services:
  # ─────────────────────────────────────────
  # PostgreSQL (dùng chung config)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sports_booking_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sports-booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sports-booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend - DEV MODE (hot reload, không build)
  # ─────────────────────────────────────────
  backend:
    image: node:20-alpine
    container_name: sports_booking_backend_dev
    working_dir: /app
    # Mount source code vào container → thay đổi code ngay lập tức
    volumes:
      - ./server/backend:/app
      - /app/node_modules        # Tránh override node_modules của container
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sports-booking?schema=public
      JWT_SECRET: dev-secret-key-not-for-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
    # Cài deps, chạy migrate rồi mới start dev server
    command: sh -c "npm install && npx prisma migrate deploy && npx prisma generate && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Frontend - DEV MODE (hot reload)
  # ─────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: sports_booking_frontend_dev
    working_dir: /app
    volumes:
      - ./client/frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
    driver: local
